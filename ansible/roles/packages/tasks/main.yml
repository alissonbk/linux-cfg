---
- name: Update pacman cache
  community.general.pacman:
    update_cache: yes

- name: Install system packages
  community.general.pacman:
    name: "{{ system_packages }}"
    state: present

- name: Check if yay is installed
  ansible.builtin.stat:
    path: /usr/bin/yay
  register: yay_bin

- name: Install yay AUR helper
  when: not yay_bin.stat.exists
  block:
    - name: Install base-devel and git
      community.general.pacman:
        name:
          - base-devel
          - git
        state: present

    - name: Clone yay
      ansible.builtin.git:
        repo: https://aur.archlinux.org/yay.git
        dest: /tmp/yay

    - name: Build and install yay
      ansible.builtin.command: makepkg -si --noconfirm
      args:
        chdir: /tmp/yay
      become: no
      environment:
        HOME: "{{ user_home }}"
      register: yay_build
      changed_when: yay_build.rc == 0

    - name: Clean up yay build
      ansible.builtin.file:
        path: /tmp/yay
        state: absent

- name: Install AUR packages with yay
  ansible.builtin.command: "yay -S --noconfirm {{ item }}"
  loop: "{{ aur_packages }}"
  become: no
  environment:
    HOME: "{{ user_home }}"
  register: aur_install
  changed_when: aur_install.rc == 0
  failed_when: false

- name: Refresh font cache
  ansible.builtin.command: fc-cache -fv
  changed_when: false
